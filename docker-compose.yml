services:
  # ---- Infrastructure ----
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tripcompass
      POSTGRES_USER: postgres
      # F2: no default secret in committed config. Compose interpolates this
      # from the repo-root .env (see .env.example); it errors if unset rather
      # than silently running with a known "postgres" password.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (copy .env.example)}
    ports:
      # F2: bind to loopback only so the DB is reachable for local dev tools but
      # never exposed on the host's external interfaces (defense if this compose
      # is ever run on an internet-facing box). Prod uses docker-compose.prod.yml
      # which keeps Postgres internal-only (expose:).
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      # F2: loopback-only (see postgres above).
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- AI Planner Service (LangGraph) ----
  planner-ai:
    build:
      context: ./planner-ai
      dockerfile: Dockerfile.dev
    # No host port mapping: planner-ai has no auth and must only be reachable
    # via the Go backend proxy. Uncomment ports below ONLY if you need to hit
    # it directly from the host for debugging.
    # ports:
    #   - "8090:8090"
    expose:
      - "8090"
    env_file:
      - ./planner-ai/.env
    environment:
      # F2: password injected from .env, not hardcoded.
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/tripcompass
      REDIS_URL: redis://redis:6379
      DB_SCHEMA: schema_travel
    volumes:
      - ./planner-ai/app:/app/app    # hot reload — no rebuild needed
    command: uvicorn app.main:app --host 0.0.0.0 --port 8090 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8090/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---- Go API Gateway ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_ADDR: redis:6379
      ALLOWED_ORIGINS: http://localhost:3000
      # Feature flag: "true" = proxy /generate to planner-ai; "false" = use Go engine
      USE_LLM_PLANNER: "true"
      PLANNER_AI_URL: "http://planner-ai:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      planner-ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8080/api/v1/ws
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
