services:
  # ---- Infrastructure ----
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tripcompass
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- AI Planner Service (LangGraph) ----
  planner-ai:
    build:
      context: ./planner-ai
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    env_file:
      - ./planner-ai/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tripcompass
      REDIS_URL: redis://redis:6379
      DB_SCHEMA: schema_travel
    volumes:
      - ./planner-ai/app:/app/app    # hot reload — no rebuild needed
    command: uvicorn app.main:app --host 0.0.0.0 --port 8090 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---- Go API Gateway ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_ADDR: redis:6379
      ALLOWED_ORIGINS: http://localhost:3000
      # Feature flag: "true" = proxy /generate to planner-ai; "false" = use Go engine
      USE_LLM_PLANNER: "true"
      PLANNER_AI_URL: "http://planner-ai:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      planner-ai:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
