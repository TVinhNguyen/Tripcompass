name: CI

on:
  push:
    branches: [main, dev, feat/**]
  pull_request:
    branches: [main , dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Detect which services changed ----
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      planner-ai: ${{ steps.filter.outputs.planner-ai }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            planner-ai:
              - 'planner-ai/**'

  # ---- Backend: Go ----
  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tripcompass_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # F3: pin an exact patch (not a floating "1.26") — the 1.25 line and
          # 1.26.0 shipped reachable crypto/x509 + net/http stdlib advisories
          # (GO-2026-4599/4600 et al.). 1.26.4 fixes them; the blocking
          # govulncheck step below enforces it stays clean.
          go-version: "1.26.4"
          cache-dependency-path: backend/go.sum

      - name: Vet
        run: go vet ./...

      # F3: govulncheck gates the build. It reports only vulnerabilities the
      # code actually reaches (call-graph analysis), so a failure here means a
      # real, reachable advisory — fix the dep or bump the Go patch, don't skip.
      - name: Vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Build
        run: go build ./...

      - name: Test
        env:
          TEST_DB_HOST: localhost
          TEST_DB_PORT: "5432"
          TEST_DB_USER: postgres
          TEST_DB_PASSWORD: postgres
          TEST_DB_NAME: tripcompass_test
        run: go test -v -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

  # ---- Frontend: Next.js ----
  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # F4: dependency audit gates the build at high+ severity. Moderate/low
      # transitive advisories stay visible in logs without blocking; a new
      # high or critical fails CI so it can't ship silently.
      - name: Dependency audit
        run: pnpm audit --audit-level=high

      - name: Build
        run: pnpm build

  # ---- Docker builds ----
  docker:
    needs: [changes, backend, frontend]
    if: |
      always() &&
      !cancelled() &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped') &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend, planner-ai]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
