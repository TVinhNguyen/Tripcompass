name: CD — Build & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: cd-deploy
  cancel-in-progress: false   # don't cancel in-progress deploys

env:
  REGISTRY: docker.io

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Build & Push Docker images to Docker Hub
  # ──────────────────────────────────────────────────────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            image: tripcompass-backend
          - service: frontend
            context: ./frontend
            image: tripcompass-frontend
            build-args: |
              NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://tripcompass.studio/api/v1' }}
              NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL || 'wss://tripcompass.studio/api/v1/ws' }}
          - service: planner-ai
            context: ./planner-ai
            image: tripcompass-planner

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build & Push — ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-args || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ──────────────────────────────────────────────────────────────────────────────
  # Deploy to production server via SSH
  # ──────────────────────────────────────────────────────────────────────────────
  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    environment: production          # requires GitHub environment approval (optional)

    steps:
      - name: Checkout deploy files
        uses: actions/checkout@v4

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            mkdir -p /opt/tripcompass/scripts /opt/tripcompass/database /opt/tripcompass/caddy /opt/tripcompass/backups

      - name: Upload deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,scripts/deploy.sh,database/schema.sql,caddy/Caddyfile"
          target: /opt/tripcompass
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            cd /opt/tripcompass
            # Pin this deploy to the exact image tag built by the build-push job.
            export IMAGE_TAG="${IMAGE_TAG:0:11}"   # sha-<7 chars>
            bash scripts/deploy.sh
