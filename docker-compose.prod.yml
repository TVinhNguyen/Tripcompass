services:
  # ---- Infrastructure ----
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tripcompass
      POSTGRES_USER: tripcompass_admin
      POSTGRES_PASSWORD: SecretPassword123!@#
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- AI Planner Service (LangGraph) ----
  planner-ai:
    build:
      context: ./planner-ai
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    env_file:
      - ./planner-ai/.env
      REDIS_URL: redis://redis:6379
      DB_SCHEMA: schema_travel
    command: uvicorn app.main:app --host 0.0.0.0 --port 8090
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8090/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---- Go API Gateway ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
      DB_PORT: 5432
      REDIS_ADDR: redis:6379
      ALLOWED_ORIGINS: http://209.38.21.57:3000
      # Feature flag: "true" = proxy /generate to planner-ai; "false" = use Go engine
      USE_LLM_PLANNER: "true"
      PLANNER_AI_URL: "http://planner-ai:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      planner-ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://209.38.21.57:8080/api/v1
        NEXT_PUBLIC_WS_URL: ws://209.38.21.57:8080/api/v1/ws
        NEXT_PUBLIC_PLANNER_AI_URL: http://209.38.21.57:8090
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
